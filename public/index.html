<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anonymous Confession</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #8b8b8b;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus {
      border-color: #5865f2;
    }

    .char-count {
      text-align: right;
      color: #8b8b8b;
      font-size: 0.8rem;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover { background: #4752c4; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .message.success {
      background: #1a3a2a;
      color: #57f287;
      border: 1px solid #57f287;
    }

    .message.error {
      background: #3a1a1a;
      color: #ed4245;
      border: 1px solid #ed4245;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔒 Anonymous Confession</h1>
    <p class="subtitle">Your identity will never be revealed. Be honest.</p>

    <textarea
      id="confession"
      placeholder="Write your confession here..."
      maxlength="2000"
    ></textarea>
    <div class="char-count"><span id="count">0</span> / 2000</div>

    <button id="submitBtn" onclick="submitConfession()">Submit Anonymously</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    const textarea = document.getElementById('confession');
    const countEl = document.getElementById('count');

    textarea.addEventListener('input', () => {
      countEl.textContent = textarea.value.length;
    });

    async function submitConfession() {
      const confession = textarea.value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      if (!confession) {
        showMessage('Please write something first.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.style.display = 'none';

      try {
        const res = await fetch('/confess', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confession }),
        });

        const data = await res.json();

        if (res.ok) {
          showMessage('✅ Your confession was posted anonymously!', 'success');
          textarea.value = '';
          countEl.textContent = '0';
        } else {
          showMessage(`❌ ${data.error}`, 'error');
        }
      } catch (err) {
        showMessage('❌ Network error. Please try again.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Submit Anonymously';
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
